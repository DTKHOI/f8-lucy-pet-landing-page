<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Favicon -->
        <link
            rel="icon"
            type="image/png"
            href="/assets/favicon/favicon-96x96.png"
            sizes="96x96"
        />
        <link
            rel="icon"
            type="image/svg+xml"
            href="/assets/favicon/favicon.svg"
        />
        <link rel="shortcut icon" href="/assets/favicon/favicon.ico" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/assets/favicon/apple-touch-icon.png"
        />
        <meta name="apple-mobile-web-app-title" content="Lucy Pet" />
        <link rel="manifest" href="/assets/favicon/site.webmanifest" />

        <!-- Resets CSS -->
        <link rel="stylesheet" href="./assets/css/resets.css" />

        <!-- Fonts -->
        <link rel="stylesheet" href="./assets/fonts/stylesheet.css" />

        <!-- Styles -->
        <link rel="stylesheet" href="./assets/css/styles.css" />

        <!-- Animation -->
        <link href="./assets/animation/aos.css" rel="stylesheet" />
        <title>Lucy Pet</title>
    </head>
    <body>
        <!-- Header -->
        <header class="header">
            <div class="content header-container">
                <div class="logo">
                    <img
                        src="./assets/img/logo.svg"
                        alt="Lucy"
                        class="logo-img"
                    />
                </div>
                <nav class="navbar">
                    <ul class="navbar__list">
                        <li class="navbar__item">
                            <a
                                href="#!"
                                class="navbar__link navbar__link--active"
                                >Home</a
                            >
                        </li>
                        <li class="navbar__item">
                            <a href="#!" class="navbar__link">About</a>
                        </li>
                        <li class="navbar__item">
                            <a href="#!" class="navbar__link"
                                >Services & Rates</a
                            >
                        </li>
                        <li class="navbar__item">
                            <a href="#!" class="navbar__link">Review</a>
                        </li>
                        <li class="navbar__item">
                            <a href="#!" class="navbar__link">Contacts us</a>
                        </li>
                    </ul>
                </nav>
                <div class="action">
                    <a href="#!" class="btn btn-header">Sign up</a>
                </div>
            </div>

            <section class="hero">
                <div class="content hero__container">
                    <figure class="hero__media">
                        <div class="hero__img-wrap">
                            <img
                                src="./assets/img/hero-img.png"
                                alt="Established & Trusted Pet Care Service"
                                class="hero__img"
                            />

                            <!-- Decorations -->
                            <img
                                src="./assets/icon/hero-image-decor-1.svg"
                                alt=""
                                class="hero__decor hero__decor--circle"
                            />
                            <img
                                src="./assets/icon/hero-image-decor-2.svg"
                                alt=""
                                class="hero__decor hero__decor--square"
                            />
                        </div>

                        <div class="hero__img-wrap--small">
                            <img
                                src="./assets/img/hero-img-2.png"
                                alt="Established & Trusted Pet Care Service"
                                class="hero__img hero__img--small"
                            />
                        </div>

                        <div class="hero__label">
                            <div class="hero__item">
                                <div
                                    class="hero__label-img-wrap hero__label-img-wrap--top"
                                >
                                    <img
                                        src="./assets/img/hero-img-3.png"
                                        alt="Pet Health"
                                        class="hero__label-img"
                                    />
                                </div>
                                <div class="hero__label-content">
                                    <h3 class="hero__label-title">
                                        Pet Health
                                    </h3>
                                    <div class="hero__line"></div>
                                    <div
                                        class="hero__line hero__line--short"
                                    ></div>
                                </div>
                            </div>
                            <div class="hero__label-separate"></div>
                            <div class="hero__item">
                                <div
                                    class="hero__label-img-wrap hero__label-img-wrap--bottom"
                                >
                                    <img
                                        src="./assets/img/hero-img-4.png"
                                        alt="Pet care"
                                        class="hero__label-img"
                                    />
                                </div>
                                <div class="hero__label-content">
                                    <h3 class="hero__label-title">Pet care</h3>
                                    <div class="hero__line"></div>
                                    <div
                                        class="hero__line hero__line--short"
                                    ></div>
                                </div>
                            </div>
                        </div>
                    </figure>
                    <div class="hero__content">
                        <h1 class="heading hero__heading">
                            Established & Trusted Pet Care Service
                        </h1>
                        <p class="section-desc hero__desc">
                            Discover a wide variety of Pawsitive services to
                            choose from, including daycare, private walks,
                            office duty and spa.
                        </p>
                        <div class="hero__actions">
                            <button class="hero__btn">
                                <span class="hero__btn-desc">Book a Meet</span>
                                <div class="hero__btn-icon-wrap">
                                    <img
                                        src="./assets/icon/next-btn.svg"
                                        alt=""
                                        class="hero__btn-icon"
                                    />
                                </div>
                            </button>
                            <a href="" class="hero__schedule"
                                >Schedule a Call</a
                            >
                        </div>
                    </div>
                </div>
            </section>
        </header>

        <main></main>
    </body>
    <script src="./assets/animation/aos.js"></script>
    <script>
        AOS.init({
            once: false,
        });
    </script>
</html>
